# Require every pull request to carry at least one recognised label
# before it can be merged.

name: PR labels check

on:
  pull_request_target:
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/github-action-required-labels@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add_comment: true
          mode: minimum
          count: 1
          labels: |
            [bot] backmerge
            [bot] release
            [scope] bug
            [scope] documentation
            [scope] enhancement
            [scope] maintenance
            [scope] significant
