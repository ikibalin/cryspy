name: CI Testing - Example Scripts

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pytest_examples:
    timeout-minutes: 60

    strategy:
      max-parallel: 3
      matrix:
        python-version: [3.14]
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set-up Python dependences
        run: |
          pip install -e .        # from setup.py
          pip install matplotlib  # extra packages
          pip install pytest      # testing packages

      - name: Run example scripts tests
        run: pytest tests/test_scripts.py -vv --color=yes
