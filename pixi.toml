# pixi is for developers only. It installs cryspy in editable mode with
# the `dev` extra; runtime and dev dependencies are declared in
# pyproject.toml (single source of truth), not duplicated here.
#
# Every task is a plain command, so it can be run either with pixi
# (`pixi run test`) or directly in any environment that has cryspy
# installed with its dev extra (`pip install -e .[dev]` then `pytest`).

[workspace]
channels = ['conda-forge']
platforms = ['linux-64', 'osx-arm64', 'win-64']

[dependencies]
python = '>=3.9'

[pypi-dependencies]
cryspy = { path = '.', editable = true, extras = ['dev'] }

[tasks]
unit-tests = 'python -m pytest tests/basic_operations/ --color=yes -v'
functional-tests = 'python -m pytest tests/functional/ --color=yes -v -n 2'
examples-tests = 'python -m pytest tests/test_scripts.py --color=yes -vv'
test = { depends-on = ['unit-tests', 'functional-tests', 'examples-tests'] }
